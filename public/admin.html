<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Painel de Administração - Poções e Soluções">
  <title>Admin — Poções e Soluções</title>
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>

  <!-- Barra de navegação -->
  <nav class="navbar">
    <div class="navbar-brand">🧪 Poções &amp; Soluções</div>
    <ul class="navbar-links">
      <li><a href="/">← Voltar à Loja</a></li>
    </ul>
  </nav>

  <div class="admin-container">

    <!-- Formulário de Cadastro -->
    <div class="admin-form">
      <h2>Cadastrar Nova Poção</h2>
      <form id="form-pocao">
        <div class="form-group">
          <label for="nome">Nome</label>
          <input type="text" id="nome" name="nome" placeholder="Ex: Poção da Invisibilidade" required>
        </div>
        <div class="form-group">
          <label for="descricao">Descrição</label>
          <textarea id="descricao" name="descricao" placeholder="Descreva os efeitos da poção..." required></textarea>
        </div>
        <div class="form-group">
          <label for="imagem">URL da Imagem</label>
          <input type="text" id="imagem" name="imagem" placeholder="https://exemplo.com/imagem.png" required>
        </div>
        <div class="form-group">
          <label for="preco">Preço (moedas)</label>
          <input type="number" id="preco" name="preco" min="1" step="1" placeholder="Ex: 250" required>
        </div>
        <button type="submit" class="btn btn-primary" style="margin-top:0.5rem;">Cadastrar Poção</button>
      </form>
    </div>

    <!-- Lista de Poções Cadastradas -->
    <div class="admin-list">
      <h2>📋 Poções Cadastradas</h2>
      <div id="admin-items">
        <div class="loading">Carregando...</div>
      </div>
    </div>

  </div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <script src="/js/admin.js"></script>
</body>
</html>
